<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Switcher - Assignment 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Theme Switcher</h1>
        <p>Select your preferred interface mode:</p>
        
        <div class="button-group">
            <button id="light-btn" class="theme-btn">Light Mode</button>
            <button id="dark-btn" class="theme-btn">Dark Mode</button>
            <button id="system-btn" class="theme-btn">System Mode</button>
        </div>

        <div class="status-box">
            Current Mode: <span id="current-theme-text">System</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
